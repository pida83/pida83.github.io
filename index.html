<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#FF6B35">

<!-- SEO & 공유 메타 -->
<title>운동은 핑계고 | 94~80년생 모임</title>
<meta name="description" content="러닝, 클라이밍, 와인, 독서, 공동육아까지. 혼자서도 함께여도 유쾌하게 즐기는 30·40대 모임입니다.">
<meta property="og:title" content="운동은 핑계고 — 94~80년생 모임">
<meta property="og:description" content="혼자서도 함께여도 유쾌하게 즐기실 분들 환영!">
<meta property="og:type" content="website">

<!-- 폰트: Pretendard (한글) + DM Serif Display (포인트) -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">

<style>
  :root {
    --bg: #FFF8F0;
    --bg-2: #FFE8D6;
    --ink: #1A1A1A;
    --ink-soft: #4A4A4A;
    --paper: #FFFFFF;
    --carrot: #FF6B35;
    --carrot-deep: #E8552B;
    --kakao: #FEE500;
    --kakao-ink: #181600;
    --line: rgba(26,26,26,0.08);
    --shadow-sm: 0 2px 8px rgba(26,26,26,0.04);
    --shadow-md: 0 8px 24px rgba(26,26,26,0.08);
    --shadow-lg: 0 20px 48px rgba(26,26,26,0.12);
    --radius: 20px;
    --radius-sm: 12px;
    --serif: 'DM Serif Display', 'Pretendard', serif;
    --sans: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    -webkit-text-size-adjust: 100%;
    -webkit-tap-highlight-color: transparent;
  }

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--ink);
    line-height: 1.5;
    min-height: 100vh;
    min-height: 100dvh;
    overflow-x: hidden;
    position: relative;
    font-feature-settings: 'tnum';
  }

  /* 배경 장식 — 그리드 + 노이즈 느낌 */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(circle at 20% 10%, rgba(255,107,53,0.08) 0%, transparent 40%),
      radial-gradient(circle at 80% 90%, rgba(255,229,0,0.10) 0%, transparent 45%);
    pointer-events: none;
    z-index: 0;
  }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--line) 1px, transparent 1px),
      linear-gradient(90deg, var(--line) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    opacity: 0.4;
    z-index: 0;
  }

  .wrap {
    position: relative;
    z-index: 1;
    max-width: 480px;
    margin: 0 auto;
    padding: 32px 20px 48px;
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
  }

  /* === HEADER === */
  .header {
    text-align: center;
    margin-bottom: 28px;
    animation: fadeUp 0.7s ease-out;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 14px;
    background: var(--ink);
    color: var(--bg);
    border-radius: 100px;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.5px;
    margin-bottom: 20px;
  }

  .badge-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #4ADE80;
    box-shadow: 0 0 0 0 rgba(74,222,128,0.6);
    animation: pulse 2s infinite;
  }

  .title {
    font-family: var(--serif);
    font-size: clamp(36px, 9vw, 52px);
    line-height: 1.05;
    letter-spacing: -0.02em;
    color: var(--ink);
    margin-bottom: 8px;
  }

  .title em {
    font-style: italic;
    color: var(--carrot);
  }

  .subtitle {
    font-size: 15px;
    color: var(--ink-soft);
    font-weight: 500;
    letter-spacing: -0.01em;
  }

  .age-tag {
    display: inline-block;
    margin-top: 16px;
    padding: 4px 10px;
    background: var(--bg-2);
    border-radius: 6px;
    font-size: 13px;
    font-weight: 600;
    color: var(--carrot-deep);
    letter-spacing: 0.02em;
  }

  /* === KEYWORD CARDS === */
  .keywords {
    margin: 28px 0 32px;
    display: grid;
    gap: 10px;
    animation: fadeUp 0.7s ease-out 0.15s both;
  }

  .kw-row {
    background: var(--paper);
    border-radius: var(--radius-sm);
    padding: 14px 16px;
    box-shadow: var(--shadow-sm);
    display: flex;
    align-items: center;
    gap: 12px;
    border: 1px solid var(--line);
    transition: transform 0.2s ease;
  }

  .kw-row:hover {
    transform: translateX(2px);
  }

  .kw-icon {
    font-size: 20px;
    flex-shrink: 0;
    width: 32px;
    height: 32px;
    display: grid;
    place-items: center;
    background: var(--bg-2);
    border-radius: 8px;
  }

  .kw-tags {
    font-size: 13.5px;
    color: var(--ink);
    font-weight: 500;
    line-height: 1.4;
    letter-spacing: -0.01em;
  }

  .kw-tags span {
    color: var(--ink-soft);
    margin: 0 2px;
  }

  /* === TAGLINE === */
  .tagline {
    text-align: center;
    margin: 8px 0 28px;
    animation: fadeUp 0.7s ease-out 0.3s both;
  }

  .tagline-quote {
    font-family: var(--serif);
    font-style: italic;
    font-size: clamp(20px, 5.5vw, 26px);
    line-height: 1.35;
    color: var(--ink);
    letter-spacing: -0.01em;
    position: relative;
    display: inline-block;
  }

  .tagline-quote::before,
  .tagline-quote::after {
    content: '';
    position: absolute;
    top: 50%;
    width: 24px;
    height: 1.5px;
    background: var(--carrot);
  }
  .tagline-quote::before { right: calc(100% + 12px); }
  .tagline-quote::after { left: calc(100% + 12px); }

  .tagline-sub {
    margin-top: 8px;
    font-size: 14px;
    color: var(--ink-soft);
  }

  /* === CTA BUTTONS === */
  .cta-group {
    display: grid;
    gap: 12px;
    margin-bottom: 24px;
    animation: fadeUp 0.7s ease-out 0.45s both;
  }

  .cta {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 24px;
    border-radius: var(--radius);
    text-decoration: none;
    font-weight: 700;
    font-size: 16px;
    letter-spacing: -0.01em;
    box-shadow: var(--shadow-md);
    transition: transform 0.2s ease, box-shadow 0.2s ease;
    position: relative;
    overflow: hidden;
    border: none;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }

  .cta:active {
    transform: scale(0.98);
  }

  @media (hover: hover) {
    .cta:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-lg);
    }
  }

  .cta-carrot {
    background: var(--carrot);
    color: white;
  }

  .cta-kakao {
    background: var(--kakao);
    color: var(--kakao-ink);
  }

  .cta-left {
    display: flex;
    align-items: center;
    gap: 14px;
    flex: 1;
    min-width: 0;
  }

  .cta-logo {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    display: grid;
    place-items: center;
    flex-shrink: 0;
    font-size: 22px;
  }

  .cta-carrot .cta-logo {
    background: rgba(255,255,255,0.2);
  }

  .cta-kakao .cta-logo {
    background: rgba(0,0,0,0.08);
  }

  .cta-text {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 2px;
    min-width: 0;
  }

  .cta-label {
    font-size: 12px;
    font-weight: 600;
    opacity: 0.7;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  .cta-title {
    font-size: 16px;
    font-weight: 700;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 100%;
  }

  .cta-arrow {
    width: 24px;
    height: 24px;
    display: grid;
    place-items: center;
    flex-shrink: 0;
    transition: transform 0.2s ease;
  }

  .cta:hover .cta-arrow {
    transform: translateX(4px);
  }

  /* 빛나는 효과 */
  .cta::after {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(
      90deg,
      transparent,
      rgba(255,255,255,0.2),
      transparent
    );
    transition: left 0.6s ease;
  }

  .cta:hover::after {
    left: 100%;
  }

  /* === FOOTER === */
  .footer {
    margin-top: auto;
    padding-top: 24px;
    text-align: center;
    animation: fadeUp 0.7s ease-out 0.6s both;
  }

  .footer-divider {
    width: 32px;
    height: 2px;
    background: var(--ink);
    margin: 0 auto 16px;
    border-radius: 2px;
  }

  .footer-text {
    font-size: 12px;
    color: var(--ink-soft);
    letter-spacing: 0.02em;
  }

  .footer-text strong {
    color: var(--ink);
    font-weight: 700;
  }

  /* === ANIMATIONS === */
  @keyframes fadeUp {
    from {
      opacity: 0;
      transform: translateY(16px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(74,222,128,0.6); }
    50% { box-shadow: 0 0 0 6px rgba(74,222,128,0); }
  }

  /* === DESKTOP === */
  @media (min-width: 768px) {
    .wrap {
      max-width: 560px;
      padding: 64px 32px;
    }

    .keywords {
      grid-template-columns: 1fr 1fr;
    }

    .kw-row {
      padding: 16px 18px;
    }

    .cta {
      padding: 22px 28px;
    }
  }

  @media (min-width: 1024px) {
    .wrap {
      max-width: 640px;
    }

    .title {
      font-size: 64px;
    }
  }

  /* 다크모드 대응 (선택) */
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1A1612;
      --bg-2: #2A2018;
      --ink: #FFF8F0;
      --ink-soft: #B8AFA5;
      --paper: #221C16;
      --line: rgba(255,248,240,0.08);
    }
    body::after { opacity: 0.2; }
  }

  /* 모션 줄이기 선호 */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.01ms !important;
    }
  }
</style>
</head>
<body>

<main class="wrap">

  <!-- HEADER -->
  <header class="header">
    <div class="badge">
      <span class="badge-dot"></span>
      <span>지금 멤버 모집중</span>
    </div>

    <h1 class="title">
      운동은<br>
      <em>핑계고</em>
    </h1>

    <p class="subtitle">혼자서도, 함께여도 유쾌하게</p>

    <div class="age-tag">94~80년생 · 30·40대</div>
  </header>

  <!-- KEYWORDS -->
  <section class="keywords">
    <div class="kw-row">
      <div class="kw-icon">🏃</div>
      <div class="kw-tags">러닝<span>·</span>클라이밍<span>·</span>프리다이빙<span>·</span>스키<span>·</span>자전거</div>
    </div>
    <div class="kw-row">
      <div class="kw-icon">🍷</div>
      <div class="kw-tags">와인<span>·</span>위스키<span>·</span>맛집탐험<span>·</span>카페투어</div>
    </div>
    <div class="kw-row">
      <div class="kw-icon">📖</div>
      <div class="kw-tags">독서<span>·</span>토론<span>·</span>영화<span>·</span>보드게임</div>
    </div>
    <div class="kw-row">
      <div class="kw-icon">👶</div>
      <div class="kw-tags">공동육아<span>·</span>키카<span>·</span>산책</div>
    </div>
  </section>

  <!-- TAGLINE -->
  <div class="tagline">
    <p class="tagline-quote">생활체육·음주·독서·육아</p>
    <p class="tagline-sub">관심 있는 활동에만 자유롭게 참여해요</p>
  </div>

  <!-- CTA -->
  <section class="cta-group">
    <a href="#" id="carrot-link" class="cta cta-carrot" aria-label="당근 모임 참여하기">
      <div class="cta-left">
        <div class="cta-logo">🥕</div>
        <div class="cta-text">
          <span class="cta-label">Step 1</span>
          <span class="cta-title">당근 모임 참여하기</span>
        </div>
      </div>
      <div class="cta-arrow">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
          <path d="M5 10h10m0 0l-4-4m4 4l-4 4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
    </a>

    <a href="#" id="kakao-link" class="cta cta-kakao" aria-label="카카오톡 오픈채팅 입장">
      <div class="cta-left">
        <div class="cta-logo">💬</div>
        <div class="cta-text">
          <span class="cta-label">Step 2</span>
          <span class="cta-title">카톡 오픈채팅 입장</span>
        </div>
      </div>
      <div class="cta-arrow">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
          <path d="M5 10h10m0 0l-4-4m4 4l-4 4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
    </a>
  </section>

  <!-- FOOTER -->
  <footer class="footer">
    <div class="footer-divider"></div>
    <p class="footer-text">
      <strong>운동은 핑계고</strong> · 동네 친구를 찾는 모임
    </p>
  </footer>

</main>

<script>
  // ========================================
  // 링크 설정 — 여기에 실제 URL을 넣어주세요
  // ========================================
  const LINKS = {
    carrot: 'https://www.daangn.com/kr/group/',     // 당근 모임 URL
    kakao:  'https://open.kakao.com/o/'             // 카카오 오픈채팅 URL
  };

  document.getElementById('carrot-link').href = LINKS.carrot;
  document.getElementById('kakao-link').href  = LINKS.kakao;

  // 모바일에서 외부 앱으로 자연스럽게 연결되도록 (당근/카카오는 자체적으로 딥링크 처리)
  // 새 탭으로 열리는 게 좋다면 아래 주석 해제
  // document.querySelectorAll('.cta').forEach(a => a.target = '_blank');

  // 클릭 트래킹 (선택) — GA, GTM 등 붙일 때 사용
  document.querySelectorAll('.cta').forEach(link => {
    link.addEventListener('click', (e) => {
      const target = e.currentTarget.id === 'carrot-link' ? 'carrot' : 'kakao';
      console.log('[click]', target);
      // gtag('event', 'click', { destination: target });
    });
  });
</script>

</body>
</html>
